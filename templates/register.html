{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h2>Register</h2>
<form action="/register" method="post">
Username: <input type="text" name="username" required minlength="1" maxlength="10">
<p>
Password: <input type="password" name="password1" required minlength="1" maxlength="10">
<p>
Password again: <input type="password" name="password2">
<p>
<input id="button" type="submit" value="Create user">
</form>
<p>
<div class="error">
{{ message }}
</div>
{% endblock %}
